<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Memory Settings</title>
    <link rel="icon" type="image/png" sizes="192x192" href=/fav/android-chrome-192x192.png />
    <link rel="apple-touch-icon" sizes="180x180" href=/fav/apple-touch-icon.png />
    <link rel="icon" type="image/png" sizes="32x32" href=/fav/favicon-32x32.png />
    <link rel="icon" type="image/png" sizes="16x16" href=/fav/favicon-16x16.png />
    <link rel="manifest" href=/fav/site.webmanifest />
  </head>
  <body>
    <section class="main">
      <div class="left">
        <div class="header">
          <h2>Settings</h2>
          <img src="./underline.svg" alt=""/>
        </div>
        <div class="block">
          <div class="headline">
            <img src="./palette.svg" alt=""/>
            <h3>Game themes</h3>
          </div>
          <div class="settings theme-settings" data-setting="theme">
            <div id="theme1" class="option" data-preview="./public/code.png">
              <img class="select" src="./select.svg" alt=""/>
              <img class="selected" src="./selected.svg" alt=""/>
              <span>Code vibes theme</span>
              <img class="selector" src="./selector.svg" alt=""/>
            </div>
            <div id="theme2" class="option" data-preview="./public/foods.png">
              <img class="select" src="./select.svg" alt=""/>
              <img class="selected" src="./selected.svg" alt=""/>
              <span>Foods theme</span>
              <img class="selector" src="./selector.svg" alt=""/>
            </div>
          </div>
        </div>
        <div class="block">
          <div class="headline">
            <img src="./chess_cyan.svg" alt=""/>
            <h3>Choose Player</h3>
          </div>
          <div class="settings player-settings" data-setting="player">
            <div class="option">
              <img class="select" src="./select.svg" alt=""/>
              <img class="selected" src="./selected.svg" alt=""/>
              <span>Blue</span>
              <img class="selector" src="./selector.svg" alt="" />
            </div>
            <div class="option">
              <img class="select" src="./select.svg" alt=""/>
              <img class="selected" src="./selected.svg" alt=""/>
              <span>Orange</span>
              <img class="selector" src="./selector.svg" alt=""/>
            </div>
          </div>
        </div>
        <div class="block">
          <div class="headline">
            <img src="./card.svg" alt="" />
            <h3>Board size</h3>
          </div>
          <div class="settings board-settings" data-setting="board">
            <div class="option">
              <img class="select" src="./select.svg" alt=""/>
              <img class="selected" src="./selected.svg" alt=""/>
              <span>16 cards</span>
              <img class="selector" src="./selector.svg" alt=""/>
            </div>
            <div class="option">
              <img class="select" src="./select.svg" alt=""/>
              <img class="selected" src="./selected.svg" alt=""/>
              <span>24 cards</span>
              <img class="selector" src="./selector.svg" alt=""/>
            </div>
            <div class="option">
              <img class="select" src="./select.svg" alt=""/>
              <img class="selected" src="./selected.svg" alt=""/>
              <span>36 cards</span>
              <img class="selector" src="./selector.svg" alt=""/>
            </div>
          </div>
        </div>
      </div>
      <div class="right">
        <section class="preview">
          <img id="themePreview" src="./code.png" alt=""/>
        </section>
        <nav>
          <span id="themeValue">Theme</span>
          <img src="./slash1.svg" alt=""/>
          <span id="playerValue">Player</span>
          <img src="./slash1.svg" alt=""/>
          <span id="boardValue">Board size</span>
          <img src="./slash1.svg" alt=""/>
          <button id="start">
            <img class="start" src="./start.svg" alt=""/>
            <img class="start--play" src="./play.svg" alt=""/>
            <span>Start</span>
          </button>
        </nav>
        <span id="settingsError" class="settings-error"></span>
      </div>
    </section>
    <script type="module" src="./src/settings.ts"></script>
  </body>
</html>
